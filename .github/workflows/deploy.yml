name: Deploy to story-living.snicolaysen.no

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ftp:passive-mode yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u $FTP_USER,$FTP_PASS ftp://ftp.domeneshop.no;
            mirror --reverse --delete --verbose dist/story-living/browser/ www/story-living/;
            bye
          "
