name: Deploy to story-living.snicolaysen.no

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          find dist/story-living/browser -type f | while IFS= read -r file; do
            remote="${file#dist/story-living/browser/}"
            echo "Uploading: $remote"
            curl -s -T "$file" \
              --ftp-create-dirs \
              --ftp-pasv \
              --user "${FTP_USER}:${FTP_PASS}" \
              "ftp://ftp.domeneshop.no/www/story-living/${remote}" \
              --retry 3 --retry-delay 2
          done
          echo "Deploy complete."
